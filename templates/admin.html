{% extends "base.html" %}

{% block extra_head %}
<style>
    .admin-form { background: var(--card-bg); padding: 3rem; border-radius: var(--radius); box-shadow: var(--shadow-strong); max-width: 700px; margin: 0 auto 3rem; border-top: 5px solid var(--secondary); }
    .form-group { margin-bottom: 1.5rem; text-align: left; }
    .form-group label { display: block; font-weight: 600; margin-bottom: 0.5rem; color: var(--primary); }
    .form-control { width: 100%; padding: 12px 15px; border: 1px solid var(--secondary); border-radius: 8px; background: var(--bg); color: var(--text); font-family: inherit; font-size: 1rem; transition: var(--transition); }
    .form-control:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(128, 0, 0, 0.1); }
    
    .share-card { background: white; padding: 2.5rem; border-radius: var(--radius); box-shadow: var(--shadow-strong); text-align: center; border: 2px solid var(--secondary); max-width: 500px; margin: 0 auto 4rem; color: #333; }
</style>
{% endblock %}

{% block content %}
    <div class="container">
        <!-- 1. PUBLIC LINK & QR CODE -->
        <h2 class="section-title">Share Your Shop</h2>
        <p style="text-align: center; margin-top: -2rem; margin-bottom: 3rem; color: var(--text-light); font-size: 1.1rem; letter-spacing: 1px;">Send this link or QR to your customers anywhere</p>
        
        <div class="share-card">
            <h3 class="serif-font" style="color: var(--primary); font-size: 1.8rem; margin-bottom: 0.5rem;">GUPTA CLOTH HOUSE</h3>
            <p style="margin-bottom: 2rem; color: var(--text-light);">Scan or click the link to browse our ethnic collection.</p>
            
            <img src="/qr_code" alt="Shop QR Code" style="width: 280px; height: 280px; border: 12px solid #fff; box-shadow: 0 0 15px rgba(0,0,0,0.1); border: 2px solid var(--secondary); border-radius: 10px;">
            
            <div style="margin-top: 2rem; background: #fdf5f5; padding: 1.5rem; border-radius: 8px; border: 1px dashed var(--secondary);">
                <p style="font-weight: 700; color: var(--primary); margin-bottom: 10px;">YOUR PUBLIC SHOP LINK:</p>
                <input type="text" value="{{ shop_url }}" id="publicLink" readonly style="width: 100%; text-align: center; padding: 10px; border: 1px solid var(--secondary); border-radius: 5px; background: #fff; font-family: monospace; font-size: 1rem; color: var(--primary);">
                <br><br>
                <button onclick="copyLink()" class="btn" style="width: auto; background: var(--secondary); color: var(--primary);"><i class="fas fa-copy"></i> Copy Public Link</button>
                &nbsp;
                <button onclick="window.print()" class="btn" style="width: auto; background: var(--primary); color: white;"><i class="fas fa-print"></i> Print QR Card</button>
            </div>
        </div>

        <div class="admin-form">
            <h2 class="section-title" style="font-size: 2.5rem; margin-bottom: 2rem;">Add New Product</h2>
            <form action="/admin" method="POST" enctype="multipart/form-data">
                <div class="form-group">
                    <label>Product Name</label>
                    <input type="text" name="name" class="form-control" required placeholder="e.g., Premium Silk Saree">
                </div>
                <div class="form-group">
                    <label>Price (₹)</label>
                    <input type="number" name="price" class="form-control" required placeholder="e.g., 2500">
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <select name="category" class="form-control" required>
                        <option value="Ladies Suite">Ladies Suite</option>
                        <option value="Sarees">Sarees</option>
                        <option value="Men Night Suite">Men's Night Suite</option>
                        <option value="Winter Wear">Winter Wear</option>
                        <option value="Pooja Cloths">Pooja Cloths</option>
                        <option value="Towels">Towels</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea name="description" class="form-control" rows="4" required placeholder="Describe the quality..."></textarea>
                </div>
                <div class="form-group">
                    <label>Product Image</label>
                    <div style="border: 2px dashed var(--secondary); padding: 2rem; text-align: center; border-radius: 8px; background: rgba(128, 0, 0, 0.03);">
                        <i class="fas fa-camera" style="font-size: 3rem; color: var(--secondary); margin-bottom: 1rem;"></i>
                        <br>
                        <input type="file" name="file" required accept="image/*" style="width: 100%;">
                    </div>
                </div>
                <button type="submit" class="btn" style="font-size: 1.2rem; padding: 15px;"><i class="fas fa-plus-circle"></i> Publish to Store</button>
            </form>
        </div>
    </div>

    <script>
        function copyLink() {
            var copyText = document.getElementById("publicLink");
            copyText.select();
            copyText.setSelectionRange(0, 99999);
            document.execCommand("copy");
            alert("Public Link Copied! Send it to your customers: " + copyText.value);
        }
    </script>
{% endblock %}
